[mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true

# Exclude test files from strict checking if needed
# [mypy-tests.*]
# disallow_untyped_defs = false

# Exclude config files
[mypy-config.*]
ignore_missing_imports = true
